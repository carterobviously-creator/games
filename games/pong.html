<!DOCTYPE html><html><body style='margin:0;background:#000'><canvas id='c'></canvas><script>let c=document.getElementById('c'),x=c.getContext('2d');c.width=600;c.height=400;let py=150,by=200,bx=300,dx=4,dy=3;onmousemove=e=>py=e.clientY;function loop(){bx+=dx;by+=dy;if(by<0||by>400)dy*=-1;if(bx<20&&by>py&&by<py+100)dx*=-1;if(bx>600){alert('Lose');location.reload()}x.fillStyle='black';x.fillRect(0,0,600,400);x.fillStyle='white';x.fillRect(10,py,10,100);x.fillRect(bx,by,10,10);requestAnimationFrame(loop)}loop()</script></body></html>
