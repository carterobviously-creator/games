<!DOCTYPE html><html><body style='margin:0;background:black'><canvas id='c'></canvas><script>let c=document.getElementById('c'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let px=200,py=200;let enemies=[{x:0,y:0}];document.onmousemove=e=>{px=e.clientX;py=e.clientY};function loop(){x.fillStyle='black';x.fillRect(0,0,c.width,c.height);x.fillStyle='red';enemies.forEach(en=>{en.x+=2;en.y+=2;x.fillRect(en.x,en.y,20,20);if(Math.abs(en.x-px)<20&&Math.abs(en.y-py)<20){alert('Game Over');location.reload()}});x.fillStyle='white';x.fillRect(px,py,20,20);requestAnimationFrame(loop)}loop()</script></body></html>
