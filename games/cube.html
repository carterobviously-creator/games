<!DOCTYPE html><html><body style='margin:0;background:black'><canvas id='c'></canvas><script>let c=document.getElementById('c'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let y=200,v=0;onkeydown=()=>v=-10;function loop(){v+=0.5;y+=v;if(y>c.height-50){y=c.height-50;v=0}x.fillStyle='black';x.fillRect(0,0,c.width,c.height);x.fillStyle='lime';x.fillRect(100,y,50,50);requestAnimationFrame(loop)}loop()</script></body></html>
