<!DOCTYPE html><html><body style='margin:0;background:#000'><canvas id='c'></canvas><script>let c=document.getElementById('c'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let player={x:100,y:300,vy:0},gravity=0.6,jump=-12,ground=350,spikes=[{x:600}];onkeydown=e=>{if(e.code==='Space'&&player.y>=ground)player.vy=jump};function loop(){player.vy+=gravity;player.y+=player.vy;if(player.y>ground){player.y=ground;player.vy=0}x.fillStyle='#000';x.fillRect(0,0,c.width,c.height);x.fillStyle='#0ff';x.fillRect(player.x,player.y,40,40);x.fillStyle='red';spikes.forEach(s=>{s.x-=6;x.beginPath();x.moveTo(s.x,ground+40);x.lineTo(s.x+20,ground);x.lineTo(s.x+40,ground+40);x.fill();if(Math.abs(s.x-player.x)<30&&player.y>=ground){alert('Game Over');location.reload()}});if(spikes[spikes.length-1].x<400)spikes.push({x:c.width+200});requestAnimationFrame(loop)}loop()</script></body></html>
