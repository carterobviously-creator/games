<!DOCTYPE html><html><body style='margin:0;background:#000'><canvas id='c'></canvas><script>let c=document.getElementById('c'),x=c.getContext('2d');c.width=400;c.height=400;let s=[{x:200,y:200}],dx=20,dy=0,food={x:100,y:100};onkeydown=e=>{if(e.key==='ArrowUp'){dx=0;dy=-20}else if(e.key==='ArrowDown'){dx=0;dy=20}else if(e.key==='ArrowLeft'){dx=-20;dy=0}else if(e.key==='ArrowRight'){dx=20;dy=0}};function loop(){let head={x:s[0].x+dx,y:s[0].y+dy};if(head.x<0||head.y<0||head.x>=400||head.y>=400||s.some(p=>p.x===head.x&&p.y===head.y)){alert('Game Over');location.reload()}s.unshift(head);if(head.x===food.x&&head.y===food.y){food.x=Math.floor(Math.random()*20)*20;food.y=Math.floor(Math.random()*20)*20}else s.pop();x.fillStyle='black';x.fillRect(0,0,400,400);x.fillStyle='lime';s.forEach(p=>x.fillRect(p.x,p.y,18,18));x.fillStyle='red';x.fillRect(food.x,food.y,18,18);setTimeout(loop,100)}loop()</script></body></html>
