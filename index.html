<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:sans-serif}
header{padding:20px;text-align:center;font-size:32px}
#games{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;padding:20px}
.game{background:#1e293b;padding:20px;border-radius:10px;cursor:pointer;text-align:center}
.game:hover{transform:scale(1.08);background:#334155}
canvas{background:#000;display:block;margin:auto}
#back{position:fixed;top:10px;left:10px;padding:10px;display:none}
</style>
</head>
<body>

<header>🔥 Game Hub</header>
<button id="back" onclick="goBack()">Back</button>
<div id="games"></div>
<div id="gameArea"></div>

<script>
const games = [
{ name:"Geometry Dash", run:gd },
{ name:"Snake", run:snake },
{ name:"Pong", run:pong },
{ name:"Flappy Bird", run:flappy }
];

const container = document.getElementById("games");
games.forEach(g=>{
 let d=document.createElement("div");
 d.className="game";
 d.innerHTML="<h3>"+g.name+"</h3>";
 d.onclick=()=>loadGame(g.run);
 container.appendChild(d);
});

function loadGame(fn){
 document.getElementById("games").style.display="none";
 document.getElementById("back").style.display="block";
 fn();
}

function goBack(){
 location.reload();
}

function createCanvas(w,h){
 let c=document.createElement("canvas");
 c.width=w;c.height=h;
 document.getElementById("gameArea").innerHTML="";
 document.getElementById("gameArea").appendChild(c);
 return c.getContext("2d");
}

/* ================= GAMES ================= */

/* Geometry Dash */
function gd(){
 let x=createCanvas(innerWidth,400);
 let y=300,v=0,g=0.6;
 let spikes=[{x:600}];

 onkeydown=()=>{ if(y>=300)v=-12 };

 function loop(){
  v+=g; y+=v;
  if(y>300){y=300;v=0}

  x.fillStyle="#000"; x.fillRect(0,0,innerWidth,400);

  x.fillStyle="#0ff";
  x.fillRect(100,y,40,40);

  x.fillStyle="red";
  spikes.forEach(s=>{
    s.x-=6;
    x.fillRect(s.x,320,40,40);
    if(Math.abs(s.x-100)<30 && y>=300){
      alert("Game Over"); location.reload();
    }
  });

  if(spikes[spikes.length-1].x<400)
    spikes.push({x:innerWidth});

  requestAnimationFrame(loop);
 }
 loop();
}

/* Snake */
function snake(){
 let x=createCanvas(400,400);
 let s=[{x:200,y:200}],dx=20,dy=0;
 let food={x:100,y:100};

 onkeydown=e=>{
  if(e.key=="ArrowUp"){dx=0;dy=-20}
  if(e.key=="ArrowDown"){dx=0;dy=20}
  if(e.key=="ArrowLeft"){dx=-20;dy=0}
  if(e.key=="ArrowRight"){dx=20;dy=0}
 };

 function loop(){
  let h={x:s[0].x+dx,y:s[0].y+dy};
  if(h.x<0||h.y<0||h.x>=400||h.y>=400||s.some(p=>p.x==h.x&&p.y==h.y)){
    alert("Game Over"); location.reload();
  }
  s.unshift(h);

  if(h.x==food.x&&h.y==food.y){
    food.x=Math.floor(Math.random()*20)*20;
    food.y=Math.floor(Math.random()*20)*20;
  } else s.pop();

  x.fillStyle="#000"; x.fillRect(0,0,400,400);
  x.fillStyle="lime"; s.forEach(p=>x.fillRect(p.x,p.y,18,18));
  x.fillStyle="red"; x.fillRect(food.x,food.y,18,18);

  setTimeout(loop,100);
 }
 loop();
}

/* Pong */
function pong(){
 let x=createCanvas(600,400);
 let py=150,bx=300,by=200,dx=4,dy=3;

 onmousemove=e=>py=e.clientY;

 function loop(){
  bx+=dx; by+=dy;

  if(by<0||by>400)dy*=-1;
  if(bx<20&&by>py&&by<py+100)dx*=-1;

  if(bx>600){alert("Lose");location.reload()}

  x.fillStyle="#000"; x.fillRect(0,0,600,400);
  x.fillStyle="#fff";
  x.fillRect(10,py,10,100);
  x.fillRect(bx,by,10,10);

  requestAnimationFrame(loop);
 }
 loop();
}

/* Flappy */
function flappy(){
 let x=createCanvas(400,600);
 let y=300,v=0,g=0.5;
 let pipes=[{x:400,h:200}];

 onkeydown=()=>v=-8;

 function loop(){
  v+=g; y+=v;

  x.fillStyle="#70c5ce";
  x.fillRect(0,0,400,600);

  x.fillStyle="yellow";
  x.fillRect(50,y,20,20);

  pipes.forEach(p=>{
    p.x-=2;

    x.fillStyle="green";
    x.fillRect(p.x,0,40,p.h);
    x.fillRect(p.x,p.h+120,40,600);

    if(p.x<70 && p.x>30 && (y<p.h || y>p.h+120)){
      alert("Game Over"); location.reload();
    }
  });

  if(pipes[pipes.length-1].x<200)
    pipes.push({x:400,h:Math.random()*300});

  requestAnimationFrame(loop);
 }
 loop();
}
</script>

</body>
</html>
